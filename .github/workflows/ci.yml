name: CI Quality Gate

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: TypeScript 型別檢查
        run: npm run type-check

      - name: 自動化測試
        run: npm test

      - name: Build 驗證
        run: npm run build
