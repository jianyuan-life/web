<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" fill="none">
  <!-- 鑒源 Full Logo — Navbar 橫式版（圖標 + 中文品牌名 + 英文）-->
  <!-- viewBox 280x64，比例約 4.4:1，比原版 400x80 更緊湊 -->

  <!-- 左側：圖標（與 logo-icon.svg 一致，縮放至 56x56 居中於 64 高度）-->
  <g transform="translate(4, 4) scale(0.875)">
    <!-- 外圓 -->
    <circle cx="32" cy="32" r="28" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- 內圓 -->
    <circle cx="32" cy="32" r="20" stroke="#c9a84c" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- 金字旁（人字形 + 中軸） -->
    <path d="M 22 20 L 32 11 L 42 20" stroke="#c9a84c" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="32" y1="11" x2="32" y2="44" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
    <!-- 皿字旁 -->
    <path d="M 20 44 L 32 38 L 44 44" stroke="#c9a84c" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 水波 -->
    <path d="M 18 52 Q 25 48, 32 52 Q 39 56, 46 52" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  </g>

  <!-- 中文品牌名：鑒源（大字，清晰可讀） -->
  <text x="72" y="36" font-family="'Noto Serif TC', Georgia, serif" font-size="30" font-weight="600" fill="#c9a84c" letter-spacing="4">鑒源</text>

  <!-- 英文品牌名：JIANYUAN（小字，品牌識別） -->
  <text x="74" y="54" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#c9a84c" letter-spacing="4" opacity="0.65">JIANYUAN</text>
</svg>
