<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <!-- 鑒源 LOGO — 簡約國際化 -->

  <!-- 符號：金+水的抽象 — 一滴水中映出金的光芒 -->
  <g transform="translate(10, 8)">
    <!-- 外圓（鏡面/水滴） -->
    <circle cx="32" cy="32" r="28" stroke="#c5963a" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- 內部：金字旁的抽象（人字形+底座） -->
    <path d="M 22 18 L 32 10 L 42 18" stroke="#c5963a" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="32" y1="10" x2="32" y2="42" stroke="#c5963a" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 20 42 L 32 36 L 44 42" stroke="#c5963a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- 水波紋 -->
    <path d="M 20 50 Q 26 46, 32 50 Q 38 54, 44 50" stroke="#c5963a" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- 中文：鑒源 -->
  <text x="80" y="42" font-family="Noto Serif TC, Georgia, serif" font-size="36" font-weight="600" fill="#c5963a" letter-spacing="6">鑒源</text>

  <!-- 英文：JIANYUAN -->
  <text x="80" y="62" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#c5963a" letter-spacing="5" opacity="0.7">JIANYUAN</text>
</svg>
